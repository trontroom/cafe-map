<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>カフェマップ - 渋谷</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter','Helvetica Neue',Arial,sans-serif;overflow:hidden}
        .login-screen{position:fixed;inset:0;z-index:9999;background:#F9FAFB;display:flex;align-items:center;justify-content:center;transition:opacity .4s,visibility .4s}
        .login-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
        .login-card{width:100%;max-width:400px;padding:48px 40px;background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.08);text-align:center}
        .login-card.hidden{display:none}
        .login-logo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#0A7AC2,#0596D5);color:#fff;font-size:28px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
        .login-title{font-size:1.5rem;font-weight:700;color:#1D2939;margin-bottom:4px}
        .login-field{margin-bottom:14px;text-align:left}
        .login-field label{display:block;font-size:.75rem;font-weight:600;color:#667085;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
        .login-field input{width:100%;padding:12px 14px;border:1.5px solid #D0D5DD;border-radius:12px;font-size:.9rem;font-family:inherit;color:#1D2939;background:#F9FAFB;transition:border-color .2s,background .2s}
        .login-field input:focus{outline:none;border-color:#0A7AC2;background:#fff;box-shadow:0 0 0 3px rgba(10,122,194,.12)}
        .login-field input::placeholder{color:#98A2B3}
        .login-btn{width:100%;padding:13px;border-radius:12px;border:none;font-size:.95rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;margin-top:6px}
        .login-btn-primary{background:linear-gradient(135deg,#0A7AC2,#0596D5);color:#fff;box-shadow:0 4px 16px rgba(10,122,194,.3)}
        .login-btn-primary:hover{box-shadow:0 6px 24px rgba(10,122,194,.4);transform:translateY(-1px)}
        .login-msg{font-size:.8rem;margin-top:10px;min-height:20px}
        .login-msg.error{color:#D92D20}
        .login-msg.success{color:#065F46;background:#D1FAE5;padding:8px 12px;border-radius:8px}
        .login-link{font-size:.82rem;color:#667085;margin-top:20px}
        .login-link span{color:#0A7AC2;font-weight:600;cursor:pointer;text-decoration:underline}
        .app-screen{display:none}.app-screen.active{display:block}
        #header{position:fixed;top:0;left:0;right:0;height:52px;background:linear-gradient(135deg,#0A7AC2,#0596D5);z-index:1002;display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-shadow:0 2px 12px rgba(10,122,194,.3)}
        #header h1{font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:.02em}
        .user-avatar{position:relative}
        .avatar-btn{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.6);background:rgba(255,255,255,.2);color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;text-transform:uppercase}
        .avatar-btn:hover{background:rgba(255,255,255,.35);border-color:#fff}
        .avatar-dropdown{position:absolute;top:calc(100% + 8px);right:0;width:220px;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.16);padding:16px;display:none;z-index:1003}
        .avatar-dropdown.open{display:block}
        .avatar-dropdown-label{font-size:.7rem;font-weight:600;color:#98A2B3;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
        .avatar-dropdown-email{font-size:.85rem;font-weight:600;color:#1D2939;margin-bottom:14px;word-break:break-all}
        .avatar-dropdown-btn{width:100%;padding:10px;border-radius:10px;border:none;font-size:.85rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
        .avatar-dropdown-logout{background:#FEE4E2;color:#D92D20}.avatar-dropdown-logout:hover{background:#FECDCA}
        #map{position:fixed;top:52px;left:0;width:100%;height:calc(100% - 52px);z-index:1}
        .loading-overlay{position:fixed;top:52px;left:0;right:0;bottom:0;background:rgba(255,255,255,.8);z-index:1003;display:flex;align-items:center;justify-content:center}
        .loading-spinner{width:40px;height:40px;border:4px solid #E4E7EC;border-top-color:#0A7AC2;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:16px;border:none;background:linear-gradient(135deg,#0A7AC2,#0596D5);color:#fff;font-size:28px;cursor:pointer;z-index:1000;box-shadow:0 4px 20px rgba(10,122,194,.4);transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center}
        .fab:hover{transform:scale(1.08)}.fab:active{transform:scale(.95)}
        .panel{position:fixed;top:12px;bottom:12px;background:#fff;border-radius:16px;z-index:1001;box-shadow:0 8px 40px rgba(0,0,0,.18);display:flex;flex-direction:column}
        .panel-left{left:12px;top:64px;bottom:12px;width:380px;transform:translateX(-120%);transition:transform .35s cubic-bezier(.32,.72,0,1)}
        .panel-left.open{transform:translateX(0)}
        .panel-toggle{position:absolute;top:50%;right:-18px;transform:translateY(-50%);width:18px;height:48px;background:#fff;border:none;border-radius:0 8px 8px 0;box-shadow:4px 0 12px rgba(0,0,0,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#667085;font-size:11px;transition:all .2s;z-index:10}
        .panel-toggle:hover{background:#F0F7FF;color:#0A7AC2}
        .panel-tab{position:fixed;top:50%;left:0;transform:translateY(-50%);width:28px;height:64px;background:#fff;border:none;border-radius:0 10px 10px 0;box-shadow:4px 0 16px rgba(0,0,0,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0A7AC2;font-size:16px;font-weight:700;z-index:1001;transition:all .2s;opacity:0;pointer-events:none}
        .panel-tab.visible{opacity:1;pointer-events:auto}.panel-tab:hover{width:32px;background:#F0F7FF}
        .panel-header{padding:12px 16px 0;flex-shrink:0}
        .panel-body{padding:8px 12px 12px;overflow-y:auto;flex:1}
        .tab-bar{display:flex;padding:0 16px;border-bottom:1.5px solid #E4E7EC;flex-shrink:0}
        .tab-btn{flex:1;padding:10px 0;border:none;background:none;font-size:.82rem;font-weight:600;font-family:inherit;color:#98A2B3;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-1.5px}
        .tab-btn.active{color:#0A7AC2;border-bottom-color:#0A7AC2}
        .cafe-card{padding:12px 14px;border:1.5px solid #E4E7EC;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;background:#fff}
        .cafe-card:hover{border-color:#0A7AC2;background:#F0F7FF;transform:translateY(-1px);box-shadow:0 2px 8px rgba(10,122,194,.12)}
        .cafe-card-name{font-size:.9rem;font-weight:600;color:#1D2939;margin-bottom:3px}
        .cafe-card-addr{font-size:.78rem;color:#667085}
        .cafe-card-meta{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
        .cafe-card-tag{font-size:.68rem;padding:2px 6px;border-radius:4px;background:#F0F7FF;color:#0A7AC2}
        .feed-card{padding:14px;border:1.5px solid #E4E7EC;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;background:#fff}
        .feed-card:hover{border-color:#0A7AC2;background:#F8FBFF;box-shadow:0 2px 8px rgba(10,122,194,.1)}
        .feed-card-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
        .feed-card-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#0A7AC2,#0596D5);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
        .feed-card-title{font-size:.88rem;font-weight:700;color:#1D2939}
        .feed-card-latest{font-size:.75rem;color:#667085;margin-top:4px;line-height:1.4}
        .feed-card-latest strong{color:#0A7AC2;font-weight:600}
        .feed-card-footer{display:flex;gap:14px;margin-top:10px;padding-top:8px;border-top:1px solid #F2F4F7}
        .feed-card-stat{font-size:.75rem;color:#667085;display:flex;align-items:center;gap:4px}
        .feed-sort{display:flex;gap:8px;margin-bottom:10px}
        .feed-sort-btn{padding:5px 12px;border-radius:8px;border:1.5px solid #E4E7EC;background:#fff;font-size:.75rem;font-weight:600;font-family:inherit;color:#667085;cursor:pointer;transition:all .15s}
        .feed-sort-btn.active{border-color:#0A7AC2;color:#0A7AC2;background:#F0F7FF}
        .thread-back{display:flex;align-items:center;gap:6px;padding:8px 12px;margin:0 -12px 8px;cursor:pointer;color:#0A7AC2;font-size:.82rem;font-weight:600;border:none;background:none;font-family:inherit}
        .thread-back:hover{background:#F0F7FF;border-radius:8px}
        .thread-cafe-info{padding:12px;background:#F9FAFB;border-radius:12px;margin-bottom:12px}
        .thread-cafe-name{font-size:1rem;font-weight:700;color:#1D2939;margin-bottom:4px}
        .thread-cafe-addr{font-size:.78rem;color:#667085;margin-bottom:6px}
        .thread-cafe-tags{display:flex;gap:4px;flex-wrap:wrap}
        .thread-cafe-tag{font-size:.7rem;padding:3px 8px;border-radius:6px;background:#F0F7FF;color:#0A7AC2}
        .thread-cafe-tag.yes{background:#D1FAE5;color:#065F46}
        .thread-cafe-tag.no{background:#FEE2E2;color:#991B1B}
        .thread-cafe-actions{display:flex;gap:8px;margin-top:10px}
        .thread-cafe-action{padding:6px 12px;border-radius:8px;border:1px solid #E4E7EC;background:#fff;font-size:.75rem;font-weight:600;font-family:inherit;cursor:pointer;color:#0A7AC2;transition:all .15s}
        .thread-cafe-action:hover{background:#F0F7FF}
        .thread-comment{padding:12px;border-bottom:1px solid #F2F4F7}
        .thread-comment:last-child{border-bottom:none}
        .thread-comment-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
        .thread-comment-user{font-size:.82rem;font-weight:600;color:#0A7AC2}
        .thread-comment-time{font-size:.7rem;color:#98A2B3}
        .thread-comment-text{font-size:.82rem;color:#344054;line-height:1.5}
        .thread-comment-actions{display:flex;gap:10px;margin-top:6px}
        .thread-comment-action{font-size:.72rem;color:#667085;background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600;padding:2px 0}
        .thread-comment-action:hover{color:#0A7AC2}
        .thread-comment-reply{margin-left:20px;border-left:2px solid #E4E7EC;padding-left:10px}
        .thread-reply-form{display:flex;gap:6px;margin-top:10px}
        .thread-reply-input{flex:1;padding:8px 12px;border:1.5px solid #D0D5DD;border-radius:10px;font-size:.82rem;font-family:inherit;background:#F9FAFB}
        .thread-reply-input:focus{outline:none;border-color:#0A7AC2;background:#fff}
        .thread-reply-btn{padding:8px 14px;border:none;border-radius:10px;background:linear-gradient(135deg,#0A7AC2,#0596D5);color:#fff;font-size:.82rem;font-weight:600;font-family:inherit;cursor:pointer}
        .thread-reply-btn:hover{box-shadow:0 2px 8px rgba(10,122,194,.3)}
        .panel-right{right:24px;left:auto;top:64px;bottom:92px;width:380px;max-width:calc(100vw - 24px);transform:scale(0);transform-origin:bottom right;opacity:0;pointer-events:none;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .2s ease}
        .panel-right.open{transform:scale(1);opacity:1;pointer-events:auto}
        .panel-close{width:32px;height:32px;border-radius:8px;border:none;background:#F2F4F7;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#667085;font-size:16px;transition:background .15s;flex-shrink:0}
        .panel-close:hover{background:#E4E7EC}
        .form-group{margin-bottom:12px}
        .form-group label{display:block;font-size:.72rem;font-weight:600;color:#667085;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
        .form-input{width:100%;padding:9px 12px;border:1.5px solid #D0D5DD;border-radius:10px;font-size:.85rem;font-family:inherit;color:#1D2939;background:#F9FAFB;transition:border-color .2s,background .2s}
        .form-input:focus{outline:none;border-color:#0A7AC2;background:#fff;box-shadow:0 0 0 3px rgba(10,122,194,.12)}
        .form-input::placeholder{color:#98A2B3}
        .form-row{display:flex;gap:8px}.form-row .form-group{flex:1}
        .form-hint{font-size:.75rem;color:#98A2B3;margin-top:4px;padding:8px 10px;background:#F9FAFB;border-radius:8px;border-left:3px solid #D0D5DD}
        .btn-group{display:flex;gap:8px;margin-top:16px}
        .btn{flex:1;padding:10px;border-radius:10px;border:none;font-size:.85rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
        .btn-primary{background:linear-gradient(135deg,#0A7AC2,#0596D5);color:#fff;box-shadow:0 2px 8px rgba(10,122,194,.3)}
        .btn-primary:hover{box-shadow:0 4px 16px rgba(10,122,194,.4);transform:translateY(-1px)}
        .btn-secondary{background:#F2F4F7;color:#667085}.btn-secondary:hover{background:#E4E7EC}
        .btn-danger{background:#FEE4E2;color:#D92D20}.btn-danger:hover{background:#FECDCA}
        .empty-msg{color:#98A2B3;font-size:.85rem;text-align:center;padding:24px 0}
        .panel-right-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #E4E7EC;flex-shrink:0}
        .panel-right-header h2{font-size:1rem;font-weight:700;color:#1D2939}
        .leaflet-popup-content-wrapper{border-radius:14px!important;box-shadow:0 8px 30px rgba(0,0,0,.15)!important;padding:0!important}
        .leaflet-popup-content{margin:0!important;min-width:200px}
        .leaflet-popup-tip{box-shadow:none!important}
        .popup-inner{padding:16px}
        .popup-name{font-size:1rem;font-weight:700;color:#1D2939;margin-bottom:6px}
        .popup-addr{font-size:.8rem;color:#667085;margin-bottom:4px}
        .popup-comment{font-size:.85rem;color:#344054;margin-bottom:10px}
        .popup-info{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
        .popup-tag{font-size:.72rem;padding:3px 8px;border-radius:6px;background:#F0F7FF;color:#0A7AC2;font-weight:500}
        .popup-tag.yes{background:#D1FAE5;color:#065F46}
        .popup-tag.no{background:#FEE2E2;color:#991B1B}
        .popup-like{display:flex;align-items:center;gap:6px;margin-bottom:10px}
        .popup-like-btn{padding:4px 12px;border-radius:8px;border:1.5px solid #E4E7EC;background:#fff;cursor:pointer;font-size:.85rem;transition:all .15s}
        .popup-like-btn:hover{border-color:#0A7AC2;background:#F0F7FF}
        .popup-like-count{font-size:.85rem;color:#667085;font-weight:600}
        .popup-thread-link{display:block;padding:8px 12px;border-radius:8px;background:#F0F7FF;color:#0A7AC2;font-size:.82rem;font-weight:600;text-align:center;cursor:pointer;border:none;width:100%;font-family:inherit;margin-bottom:8px;transition:all .15s}
        .popup-thread-link:hover{background:#DBEAFE}
        .popup-btns{display:flex;gap:8px;margin-top:8px}
        .popup-btn{padding:6px 14px;border-radius:8px;border:none;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s}
        .popup-btn-edit{background:#E0F2FE;color:#0A7AC2}.popup-btn-edit:hover{background:#BAE6FD}
        .popup-btn-del{background:#FEE4E2;color:#D92D20}.popup-btn-del:hover{background:#FECDCA}
        .leaflet-control-attribution{font-size:10px!important}
        .view{display:none}.view.active{display:block}

        .list-search{margin-bottom:8px;flex-shrink:0;display:flex;gap:6px;align-items:center}
        .list-search-input{flex:1;padding:8px 12px;border:1.5px solid #E4E7EC;border-radius:10px;font-size:.82rem;font-family:inherit;color:#1D2939;background:#F9FAFB;transition:border-color .2s,background .2s}
        .list-search-input:focus{outline:none;border-color:#0A7AC2;background:#fff;box-shadow:0 0 0 3px rgba(10,122,194,.1)}
        .list-search-input::placeholder{color:#98A2B3}
        .list-search-btn{padding:8px 14px;border:none;border-radius:10px;background:linear-gradient(135deg,#0A7AC2,#0596D5);color:#fff;font-size:.82rem;font-weight:600;font-family:inherit;cursor:pointer;flex-shrink:0;transition:all .15s}
        .list-search-btn:hover{box-shadow:0 2px 8px rgba(10,122,194,.3)}

        .list-filter{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;padding-bottom:4px;flex-shrink:0}
        .list-filter::-webkit-scrollbar{display:none}
        .list-filter-chip{flex-shrink:0;padding:5px 12px;border-radius:8px;border:1.5px solid #E4E7EC;background:#fff;font-size:.72rem;font-weight:600;font-family:inherit;color:#667085;cursor:pointer;transition:all .15s;white-space:nowrap}
        .list-filter-chip.active{border-color:#0A7AC2;color:#0A7AC2;background:#F0F7FF}
        .list-filter-chip:hover{border-color:#0A7AC2;background:#F8FBFF}
        .list-sort{display:flex;gap:6px;margin-bottom:10px;flex-shrink:0}
        .list-sort-btn{padding:5px 12px;border-radius:8px;border:1.5px solid #E4E7EC;background:#fff;font-size:.72rem;font-weight:600;font-family:inherit;color:#667085;cursor:pointer;transition:all .15s}
        .list-sort-btn.active{border-color:#0A7AC2;color:#0A7AC2;background:#F0F7FF}
        .list-sort-btn:hover{border-color:#0A7AC2;background:#F8FBFF}

        .cafe-card{border:1.5px solid #E4E7EC;border-radius:12px;margin-bottom:8px;background:#fff;transition:all .2s;overflow:hidden}
        .cafe-card:hover{border-color:#0A7AC2;box-shadow:0 2px 8px rgba(10,122,194,.1)}
        .cafe-card-head{padding:12px 14px;cursor:pointer;transition:background .15s}
        .cafe-card-head:hover{background:#F8FBFF}
        .cafe-card-name-row{display:flex;align-items:center;gap:8px}
        .cafe-card-status{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:6px;flex-shrink:0;letter-spacing:.02em}
        .cafe-card-status.open{background:#D1FAE5;color:#065F46}
        .cafe-card-status.closed{background:#FEE2E2;color:#991B1B}
        .cafe-card-status.unknown{background:#F2F4F7;color:#98A2B3}
        .cafe-card-name{font-size:.88rem;font-weight:600;color:#1D2939;flex:1;min-width:0}
        .cafe-card-addr{font-size:.75rem;color:#667085;margin-top:3px;line-height:1.3}
        .cafe-card-meta{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
        .cafe-card-tag{font-size:.65rem;padding:2px 7px;border-radius:5px;font-weight:500}
        .cafe-card-tag.yes{background:#D1FAE5;color:#065F46}
        .cafe-card-tag.no{background:#FEE2E2;color:#991B1B}
        .cafe-card-tag.unknown{background:#F2F4F7;color:#98A2B3}
        .cafe-card-expand{font-size:.68rem;color:#0A7AC2;font-weight:600;margin-top:6px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;transition:color .15s}
        .cafe-card-expand:hover{color:#0596D5}

        .cafe-card-details{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.32,.72,0,1),padding .25s;padding:0 14px}
        .cafe-card-details.open{max-height:500px;padding:0 14px 14px}
        .cafe-card-detail-divider{height:1px;background:#E4E7EC;margin-bottom:10px}
        .cafe-card-comment{font-size:.82rem;color:#344054;line-height:1.5;margin-bottom:10px;padding:8px 10px;background:#F9FAFB;border-radius:8px;border-left:3px solid #0A7AC2}
        .cafe-card-info-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
        .cafe-card-info-item{font-size:.75rem;color:#667085;display:flex;align-items:center;gap:4px}
        .cafe-card-info-item .icon{font-size:.85rem}
        .cafe-card-actions{display:flex;flex-wrap:wrap;gap:6px}
        .cafe-card-action{padding:7px 12px;border-radius:8px;border:1px solid #E4E7EC;background:#fff;font-size:.72rem;font-weight:600;font-family:inherit;cursor:pointer;color:#0A7AC2;transition:all .15s;display:inline-flex;align-items:center;gap:4px;text-decoration:none}
        .cafe-card-action:hover{background:#F0F7FF;border-color:#0A7AC2}
        .cafe-card-action.danger{color:#D92D20;border-color:#FECACA}
        .cafe-card-action.danger:hover{background:#FEF2F2}

        @media(max-width:768px){.panel-left,.panel-right{width:calc(100vw - 24px)}.panel-right{right:12px}.fab{bottom:16px;right:16px}}
    </style>
</head>
<body>
    <div class="login-screen" id="login-screen">
        <div class="login-card" id="login-card">
            <div class="login-logo">C</div>
            <div class="login-title">ログイン</div>
            <div class="login-field" style="margin-top:24px"><label>メールアドレス</label><input type="email" id="login-email" placeholder="example@email.com"></div>

    <script type="module">
        import {createClient} from 'https://esm.sh/@supabase/supabase-js@2';
        const SUPABASE_URL='https://gyeogrnfnmjrhzqikjvq.supabase.co';
        const SUPABASE_KEY='sb_publishable_1hTi4qYLdb2CC4fqOyCiiw_VJNO5n6j';
        const supabase=createClient(SUPABASE_URL,SUPABASE_KEY);

        let cafes=[],markers=[],map,currentCafeId=null,currentUser=null,mapInitialized=false,currentTab='list',feedSort='newest',listFilter=null,listSort='newest',expandedCafeId=null,listSearch='';
        const $=id=>document.getElementById(id);

        function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
        function showLoading(){let el=document.getElementById('loading-overlay');if(!el){el=document.createElement('div');el.id='loading-overlay';el.className='loading-overlay';el.innerHTML='<div class="loading-spinner"></div>';document.body.appendChild(el)}}
        function hideLoading(){const el=document.getElementById('loading-overlay');if(el)el.remove()}
        function timeAgo(date){const s=Math.floor((Date.now()-new Date(date))/1000);if(s<60)return'たった今';if(s<3600)return Math.floor(s/60)+'分前';if(s<86400)return Math.floor(s/3600)+'時間前';return Math.floor(s/86400)+'日前'}
        function isCafeOpen(hours){
            if(!hours)return'unknown';
            const now=new Date();const day=now.getDay();const h=now.getHours();const m=now.getMinutes();const cur=h*60+m;
            const parts=hours.replace(/[～~〜]/g,'-').split('/').map(s=>s.trim());
            for(const part of parts){
                const match=part.match(/(\d{1,2}):(\d{2})\s*[-ー]\s*(\d{1,2}):(\d{2})/);
                if(!match)continue;
                const open=parseInt(match[1])*60+parseInt(match[2]);
                const close=parseInt(match[3])*60+parseInt(match[4]);
                if(close<open){if(cur>=open||cur<close)return'open'}
                else{if(cur>=open&&cur<close)return'open'}
            }
            return'closed';
        }
        function getGoogleSearchUrl(cafe){return'https://www.google.com/search?q='+encodeURI((cafe.name||'')+' '+(cafe.address||'')+' カ페')}

        function switchToApp(user){if(!$('login-screen'))return;currentUser=user;$('login-screen').classList.add('hidden');$('app-screen').classList.add('active');$('avatar-btn').textContent=user.email.charAt(0);$('dropdown-email').textContent=user.email;if(!mapInitialized){initMap();mapInitialized=true}loadFromSupabase()}
        function switchToLogin(){if(!$('login-screen'))return;currentUser=null;$('login-screen').classList.remove('hidden');$('app-screen').classList.remove('active');$('login-email').value='';$('login-password').value='';$('signup-email').value='';$('signup-password').value='';$('signup-password-confirm').value='';setMsg('login-msg','');setMsg('signup-msg','');$('login-card').classList.remove('hidden');$('signup-card').classList.add('hidden')}
        function setMsg(id,msg,type){const el=$(id);el.textContent=msg;el.className='login-msg '+(type||'')}

        async function loadFromSupabase(){const{data,error}=await supabase.from('cafes').select('*').order('created_at',{ascending:true});if(error){console.error(error);return}cafes=data||[];renderCurrentView();renderMarkers()}
        async function loadComments(cafeId){const{data,error}=await supabase.from('comments').select('*').eq('cafe_id',cafeId).order('created_at',{ascending:true});if(error)return[];return data||[]}
        async function loadAllComments(){const{data,error}=await supabase.from('comments').select('*').order('created_at',{ascending:false});if(error)return[];return data||[]}

        function renderCurrentView(){if(currentTab==='list')renderList();else if(currentTab==='feed')renderFeed()}

        function renderList(){
            let filtered=[...cafes];

            if(listSearch){
                const q=listSearch.toLowerCase();
                filtered=filtered.filter(c=>(c.name||'').toLowerCase().includes(q)||(c.address||'').toLowerCase().includes(q));
            }

            if(listFilter==='wifi')filtered=filtered.filter(c=>c.wifi===true);
            else if(listFilter==='power')filtered=filtered.filter(c=>c.power===true);
            else if(listFilter==='parking')filtered=filtered.filter(c=>c.parking===true);

            if(listSort==='newest')filtered.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
            else if(listSort==='popular')filtered.sort((a,b)=>(b.like_count||0)-(a.like_count||0));
            else if(listSort==='name')filtered.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ja'));

            const searchHtml=`<div class="list-search"><input type="text" class="list-search-input" id="list-search-input" placeholder="カフェ名・住所で検索..." value="${esc(listSearch)}" onkeydown="if(event.key==='Enter')doListSearch()"><button class="list-search-btn" onclick="doListSearch()">検索</button></div>`;
            const filterHtml=`<div class="list-filter"><button class="list-filter-chip ${!listFilter?'active':''}" onclick="setListFilter(null)">すべて</button><button class="list-filter-chip ${listFilter==='wifi'?'active':''}" onclick="setListFilter('wifi')">📶 Wifi</button><button class="list-filter-chip ${listFilter==='power'?'active':''}" onclick="setListFilter('power')">🔌 電源</button><button class="list-filter-chip ${listFilter==='parking'?'active':''}" onclick="setListFilter('parking')">🅿️ 駐車場</button></div>`;
            const sortHtml=`<div class="list-sort"><button class="list-sort-btn ${listSort==='newest'?'active':''}" onclick="setListSort('newest')">🕐 新しい順</button><button class="list-sort-btn ${listSort==='popular'?'active':''}" onclick="setListSort('popular')">👍 いいね順</button><button class="list-sort-btn ${listSort==='name'?'active':''}" onclick="setListSort('name')">あいうえお順</button></div>`;

            if(filtered.length===0){$('view-list').innerHTML=searchHtml+filterHtml+sortHtml+'<p class="empty-msg">'+(listSearch?'"'+esc(listSearch)+'" に一致するカフェがありません':'カフェがありません')+'</p>';return}

            const cardsHtml=filtered.map(c=>{
                const openStatus=isCafeOpen(c.hours);
                const statusClass=openStatus==='open'?'open':openStatus==='closed'?'closed':'unknown';
                const statusText=openStatus==='open'?'営業中':openStatus==='closed'?'閉店':'不明';
                const expanded=expandedCafeId===c.id;

                const tags=[];
                if(c.wifi===true)tags.push('<span class="cafe-card-tag yes">Wifi あり</span>');
                else if(c.wifi===false)tags.push('<span class="cafe-card-tag no">Wifi なし</span>');
                if(c.power===true)tags.push('<span class="cafe-card-tag yes">電源 あり</span>');
                else if(c.power===false)tags.push('<span class="cafe-card-tag no">電源 なし</span>');
                if(c.parking===true)tags.push('<span class="cafe-card-tag yes">駐車場 あり</span>');
                else if(c.parking===false)tags.push('<span class="cafe-card-tag no">駐車場 なし</span>');

                return`<div class="cafe-card" data-id="${c.id}">
                    <div class="cafe-card-head" onclick="toggleCafeCard(${c.id})">
                        <div class="cafe-card-name-row">
                            <span class="cafe-card-status ${statusClass}">${statusText}</span>
                            <span class="cafe-card-name">${esc(c.name)}</span>
                        </div>
                        <div class="cafe-card-addr">${esc(c.address||'')}</div>
                        ${tags.length?`<div class="cafe-card-meta">${tags.join('')}</div>`:''}
                        <div class="cafe-card-expand">${expanded?'▲ 詳細を閉じる':'▼ 詳細を見る'}</div>
                    </div>
                    <div class="cafe-card-details ${expanded?'open':''}">
                        <div class="cafe-card-detail-divider"></div>
                        ${c.comment?`<div class="cafe-card-comment">${esc(c.comment)}</div>`:''}
                        <div class="cafe-card-info-row">
                            ${c.hours?`<span class="cafe-card-info-item"><span class="icon">🕐</span>${esc(c.hours)}</span>`:''}
                            <span class="cafe-card-info-item"><span class="icon">👍</span>${c.like_count||0}いいね</span>
                            <span class="cafe-card-info-item"><span class="icon">📍</span>${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}</span>
                        </div>
                        <div class="cafe-card-actions">
                            <button class="cafe-card-action" onclick="event.stopPropagation();jumpToCafe(${c.id})">📍 地図で見る</button>
                            <a class="cafe-card-action" href="${getGoogleSearchUrl(c)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔍 Google検索</a>
                            <button class="cafe-card-action" onclick="event.stopPropagation();openThread(${c.id})">💬 スレッド</button>
                            ${currentUser?`<button class="cafe-card-action" onclick="event.stopPropagation();editCafe(${c.id})">✏️ 編集</button>`:''}
                            ${currentUser?`<button class="cafe-card-action danger" onclick="event.stopPropagation();deleteCafe(${c.id})">🗑️ 削除</button>`:''}
                        </div>
                    </div>
                </div>`
            }).join('');

            $('view-list').innerHTML=searchHtml+filterHtml+sortHtml+cardsHtml;
        }

        window.toggleCafeCard=function(id){expandedCafeId=expandedCafeId===id?null:id;renderList()};
        window.setListFilter=function(f){listFilter=f;expandedCafeId=null;renderList()};
        window.setListSort=function(s){listSort=s;expandedCafeId=null;renderList()};
        window.setListSearch=function(v){listSearch=v;expandedCafeId=null;renderList()};
        window.doListSearch=function(){const el=$('list-search-input');if(el)setListSearch(el.value.trim())};

        async function renderFeed(){
            const allComments=await loadAllComments();
            const cafeMap={};cafes.forEach(c=>{cafeMap[c.id]=c});
            const threads=cafes.map(c=>{const cc=allComments.filter(x=>x.cafe_id===c.id);return{cafe:c,comments:cc,latest:cc.length>0?cc[cc.length-1]:null,count:cc.length,likeCount:c.like_count||0}});
            let sorted=[...threads];
            if(feedSort==='newest')sorted.sort((a,b)=>{const ta=a.latest?a.latest.created_at:a.cafe.created_at;const tb=b.latest?b.latest.created_at:b.cafe.created_at;return new Date(tb)-new Date(ta)});
            else sorted.sort((a,b)=>b.likeCount-a.likeCount||b.count-a.count);
            $('view-feed').innerHTML=`
                <div class="feed-sort"><button class="feed-sort-btn ${feedSort==='newest'?'active':''}" onclick="setFeedSort('newest')">🕐 新しい順</button><button class="feed-sort-btn ${feedSort==='popular'?'active':''}" onclick="setFeedSort('popular')">👍 いいね順</button></div>
                ${sorted.length===0?'<p class="empty-msg">まだカフェがありません</p>':sorted.map(t=>`
                    <div class="feed-card" onclick="openThread(${t.cafe.id})">
                        <div class="feed-card-header"><div class="feed-card-icon">☕</div><div><div class="feed-card-title">${esc(t.cafe.name)}</div></div></div>
                        ${t.latest?`<div class="feed-card-latest"><strong>${esc(t.latest.nickname)}</strong>: ${esc(t.latest.text)}</div>`:'<div class="feed-card-latest" style="color:#98A2B3">まだコメントがありません</div>'}
                        <div class="feed-card-footer"><span class="feed-card-stat">💬 ${t.count}件</span><span class="feed-card-stat">👍 ${t.likeCount}</span><span class="feed-card-stat">🕐 ${t.latest?timeAgo(t.latest.created_at):timeAgo(t.cafe.created_at)}</span></div>
                    </div>
                `).join('')}`;
        }

        window.setFeedSort=function(s){feedSort=s;renderFeed()};

        async function openThread(cafeId){
            const cafe=cafes.find(c=>c.id===cafeId);if(!cafe)return;
            currentCafeId=cafeId;
            const comments=await loadComments(cafeId);
            const tags=[];
            if(cafe.hours)tags.push(`<span class="thread-cafe-tag">${esc(cafe.hours)}</span>`);
            if(cafe.wifi===true)tags.push('<span class="thread-cafe-tag yes">Wifi あり</span>');
            else if(cafe.wifi===false)tags.push('<span class="thread-cafe-tag no">Wifi なし</span>');
            if(cafe.power===true)tags.push('<span class="thread-cafe-tag yes">電源 あり</span>');
            else if(cafe.power===false)tags.push('<span class="thread-cafe-tag no">電源 なし</span>');
            if(cafe.parking===true)tags.push('<span class="thread-cafe-tag yes">駐車場 あり</span>');
            else if(cafe.parking===false)tags.push('<span class="thread-cafe-tag no">駐車場 なし</span>');

            const replies=comments.filter(c=>c.parent_id);
            const topComments=comments.filter(c=>!c.parent_id);

            $('view-thread').innerHTML=`
                <button class="thread-back" onclick="showTab('${currentTab==='feed'?'feed':'list'}')">← 戻る</button>
                <div class="thread-cafe-info">
                    <div class="thread-cafe-name">${esc(cafe.name)}</div>
                    <div class="thread-cafe-addr">${esc(cafe.address||'')}</div>
                    ${tags.length?`<div class="thread-cafe-tags">${tags.join('')}</div>`:''}
                    <div class="thread-cafe-actions">
                        <button class="thread-cafe-action" onclick="jumpToCafe(${cafe.id})">📍 地図で見る</button>
                        ${currentUser?`<button class="thread-cafe-action" onclick="likeCafe(${cafe.id})">👍 いいね ${cafe.like_count||0}</button>`:''}
                    </div>
                </div>
                <div id="thread-comments">
                    ${topComments.length===0?'<p class="empty-msg">まだ書き込みがありません</p>':''}
                    ${topComments.map(c=>{
                        const childReplies=replies.filter(r=>r.parent_id===c.id);
                        return`
                            <div class="thread-comment">
                                <div class="thread-comment-header"><span class="thread-comment-user">${esc(c.nickname)}</span><span class="thread-comment-time">${timeAgo(c.created_at)}</span></div>
                                <div class="thread-comment-text">${esc(c.text)}</div>
                                <div class="thread-comment-actions">
                                    ${currentUser?`<button class="thread-comment-action" onclick="likeComment(${c.id})">👍 ${c.like_count||0}</button>`:`<span class="thread-comment-action">👍 ${c.like_count||0}</span>`}
                                    ${currentUser?`<button class="thread-comment-action" onclick="showReplyForm(${c.id})">返信</button>`:''}
                                    ${currentUser&&c.user_id===currentUser.id?`<button class="thread-comment-action" onclick="deleteComment(${c.id},${cafe.id})" style="color:#D92D20">削除</button>`:''}
                                </div>
                                <div id="reply-form-${c.id}"></div>
                                ${childReplies.length>0?`<div class="thread-comment-reply">${childReplies.map(r=>`
                                    <div class="thread-comment">
                                        <div class="thread-comment-header"><span class="thread-comment-user">${esc(r.nickname)}</span><span class="thread-comment-time">${timeAgo(r.created_at)}</span></div>
                                        <div class="thread-comment-text">${esc(r.text)}</div>
                                    </div>
                                `).join('')}</div>`:''}
                            </div>`;
                    }).join('')}
                </div>
                ${currentUser?`
                <div style="padding:12px 0;border-top:1.5px solid #E4E7EC;margin-top:8px">
                    <div style="display:flex;gap:6px">
                        <input type="text" class="thread-reply-input" id="thread-nickname" placeholder="名前" style="width:80px">
                        <input type="text" class="thread-reply-input" id="thread-text" placeholder="書き込む...">
                        <button class="thread-reply-btn" onclick="postThreadComment(${cafe.id})">投稿</button>
                    </div>
                </div>`:''}
            `;
            switchView('thread');
        }

        window.showTab=function(tab){currentTab=tab;$('tab-list').classList.toggle('active',tab==='list');$('tab-feed').classList.toggle('active',tab==='feed');if(tab==='list')renderList();else renderFeed();switchView(tab)};
        window.openThread=openThread;

        window.jumpToCafe=function(id){const c=cafes.find(x=>x.id===id);if(!c)return;map.setView([c.lat,c.lng],16);markers.forEach(m=>{m.closePopup()});const idx=cafes.findIndex(x=>x.id===id);if(markers[idx])markers[idx].openPopup()};

        window.likeCafe=async function(id){
            if(!currentUser)return;
            const cafe=cafes.find(c=>c.id===id);if(!cafe)return;
            const n=(cafe.like_count||0)+1;
            await supabase.from('cafes').update({like_count:n}).eq('id',id);
            cafe.like_count=n;renderMarkers();openThread(id);
        };

        window.likeComment=async function(commentId){
            if(!currentUser)return;
            const{data}=await supabase.from('comments').select('like_count').eq('id',commentId).single();
            const n=(data?.like_count||0)+1;
            await supabase.from('comments').update({like_count:n}).eq('id',commentId);
            openThread(currentCafeId);
        };

        window.postThreadComment=async function(cafeId){
            if(!currentUser){alert('ログインしてください');return}
            const nickEl=$('thread-nickname'),textEl=$('thread-text');
            if(!nickEl||!textEl){return}
            const nick=nickEl.value.trim(),text=textEl.value.trim();
            if(!nick||!text){alert('名前とメッセージを入力してください');return}
            const{error}=await supabase.from('comments').insert([{cafe_id:cafeId,nickname:nick,text:text,user_id:currentUser.id}]);
            if(error){alert('投稿エラー: '+error.message);return}
            openThread(cafeId);
        };

        window.showReplyForm=async function(parentId){
            const el=$(`reply-form-${parentId}`);if(!el)return;
            el.innerHTML=`<div class="thread-reply-form"><input type="text" class="thread-reply-input" id="reply-nick-${parentId}" placeholder="名前" style="width:80px"><input type="text" class="thread-reply-input" id="reply-text-${parentId}" placeholder="返信..."><button class="thread-reply-btn" onclick="postReply(${parentId},${currentCafeId})">返信</button></div>`;
        };

        window.postReply=async function(parentId,cafeId){
            if(!currentUser){alert('ログインしてください');return}
            const nickEl=$(`reply-nick-${parentId}`),textEl=$(`reply-text-${parentId}`);
            if(!nickEl||!textEl){return}
            const nick=nickEl.value.trim(),text=textEl.value.trim();
            if(!nick||!text){alert('名前とメッセージを入力してください');return}
            const{error}=await supabase.from('comments').insert([{cafe_id:cafeId,nickname:nick,text:text,parent_id:parentId,user_id:currentUser.id}]);
            if(error){alert('投稿エラー: '+error.message);return}
            openThread(cafeId);
        };

        window.deleteComment=async function(commentId,cafeId){
            if(!confirm('この書き込みを削除しますか？'))return;
            await supabase.from('comments').delete().eq('id',commentId);
            openThread(cafeId);
        };

        function switchView(name){['view-list','view-feed','view-thread'].forEach(v=>$(v).classList.remove('active'));const map={list:'view-list',feed:'view-feed',thread:'view-thread'};$(map[name]).classList.add('active')}

        function buildPopupHtml(cafe){
            const info=[];
            if(cafe.hours)info.push(`<span class="popup-tag">${esc(cafe.hours)}</span>`);
            if(cafe.wifi===true)info.push('<span class="popup-tag yes">Wifi あり</span>');else if(cafe.wifi===false)info.push('<span class="popup-tag no">Wifi なし</span>');
            if(cafe.power===true)info.push('<span class="popup-tag yes">電源 あり</span>');else if(cafe.power===false)info.push('<span class="popup-tag no">電源 なし</span>');
            if(cafe.parking===true)info.push('<span class="popup-tag yes">駐車場 あり</span>');else if(cafe.parking===false)info.push('<span class="popup-tag no">駐車場 なし</span>');
            return`<div class="popup-inner"><div class="popup-name">${esc(cafe.name)}</div><div class="popup-addr">${esc(cafe.address||'')}</div><div class="popup-comment">${esc(cafe.comment||'')}</div>${info.length?`<div class="popup-info">${info.join('')}</div>`:''}<button class="popup-thread-link" onclick="openThread(${cafe.id})">💬 スレッドを見る</button>${currentUser?`<div class="popup-btns"><button class="popup-btn popup-btn-edit" onclick="editCafe(${cafe.id})">編集</button><button class="popup-btn popup-btn-del" onclick="deleteCafe(${cafe.id})">削除</button></div>`:''}</div>`;
        }

        function initMap(){
            map=L.map('map',{zoomControl:false}).setView([35.6595,139.6990],15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'&copy; <a href="https://carto.com/">CARTO</a> &copy; <a href="https://openstreetmap.org/copyright">OSM</a>'}).addTo(map);
            L.control.zoom({position:'topright'}).addTo(map);
            map.on('click',function(e){if(!currentUser)return;openRightPanel();$('cafe-lat').value=e.latlng.lat.toFixed(6);$('cafe-lng').value=e.latlng.lng.toFixed(6);$('form-save').textContent='登録';$('right-title').textContent='カフェを追加'});
        }

        async function renderMarkers(){markers.forEach(m=>map.removeLayer(m));markers=[];for(const cafe of cafes){const marker=L.marker([cafe.lat,cafe.lng]).addTo(map);marker.bindPopup(buildPopupHtml(cafe),{closeButton:true,maxWidth:300});markers.push(marker)}}

        function openRightPanel(){$('panel-right').classList.add('open')}
        function closeRightPanel(){$('panel-right').classList.remove('open');resetForm()}
        function resetForm(){$('cafe-form').reset();$('edit-id').value='';$('form-save').textContent='登録';$('right-title').textContent='カフェを追加'}

        window.editCafe=function(id){id=Number(id);const c=cafes.find(x=>x.id===id);if(!c)return;map.closePopup();$('edit-id').value=id;$('cafe-name').value=c.name;$('cafe-address').value=c.address||'';$('cafe-lat').value=c.lat;$('cafe-lng').value=c.lng;$('cafe-comment').value=c.comment||'';$('cafe-hours').value=c.hours||'';$('cafe-wifi').value=c.wifi===true?'true':c.wifi===false?'false':'';$('cafe-power').value=c.power===true?'true':c.power===false?'false':'';$('cafe-parking').value=c.parking===true?'true':c.parking===false?'false':'';$('form-save').textContent='更新';$('right-title').textContent='カフェを編集';openRightPanel()};
        window.deleteCafe=async function(id){if(!confirm('削除しますか？'))return;map.closePopup();showLoading();await supabase.from('cafes').delete().eq('id',id);await supabase.from('comments').delete().eq('cafe_id',id);await loadFromSupabase();hideLoading()};

        function toggleLeftPanel(){const p=$('panel-left'),t=$('panel-tab'),g=$('panel-toggle');if(p.classList.contains('open')){p.classList.remove('open');t.classList.add('visible');g.innerHTML='&#9654;'}else{p.classList.add('open');t.classList.remove('visible');g.innerHTML='&#9664;'}}
        $('panel-toggle').addEventListener('click',toggleLeftPanel);$('panel-tab').addEventListener('click',toggleLeftPanel);
        $('fab-add').addEventListener('click',()=>{if(!currentUser)return;map.closePopup();resetForm();openRightPanel()});
        $('right-close').addEventListener('click',closeRightPanel);$('form-cancel').addEventListener('click',closeRightPanel);
        $('tab-list').addEventListener('click',()=>showTab('list'));$('tab-feed').addEventListener('click',()=>showTab('feed'));
        $('avatar-btn').addEventListener('click',e=>{e.stopPropagation();$('avatar-dropdown').classList.toggle('open')});
        document.addEventListener('click',()=>$('avatar-dropdown').classList.remove('open'));

        $('cafe-form').addEventListener('submit',async e=>{
            e.preventDefault();if(!currentUser)return;
            const editId=$('edit-id').value?Number($('edit-id').value):null;
            const name=$('cafe-name').value.trim(),address=$('cafe-address').value.trim(),lat=parseFloat($('cafe-lat').value),lng=parseFloat($('cafe-lng').value),comment=$('cafe-comment').value.trim(),hours=$('cafe-hours').value.trim();
            const wifi=$('cafe-wifi').value===''?null:$('cafe-wifi').value==='true',power=$('cafe-power').value===''?null:$('cafe-power').value==='true',parking=$('cafe-parking').value===''?null:$('cafe-parking').value==='true';
            if(!name||isNaN(lat)||isNaN(lng))return;
            showLoading();
            if(editId)await supabase.from('cafes').update({name,address,lat,lng,comment,hours,wifi,parking}).eq('id',editId);
            else await supabase.from('cafes').insert([{name,address,lat,lng,comment,hours,wifi,parking,user_id:currentUser.id}]);
            await loadFromSupabase();hideLoading();closeRightPanel();
        });

        $('goto-signup').addEventListener('click',()=>{setMsg('login-msg','');$('login-card').classList.add('hidden');$('signup-card').classList.remove('hidden')});
        $('goto-login').addEventListener('click',()=>{setMsg('signup-msg','');$('signup-card').classList.add('hidden');$('login-card').classList.remove('hidden')});
        $('btn-login').addEventListener('click',async()=>{setMsg('login-msg','');const e=$('login-email').value.trim(),p=$('login-password').value;if(!e||!p){setMsg('login-msg','入力してください','error');return}setMsg('login-msg','ログイン中...');const{error}=await supabase.auth.signInWithPassword({email:e,password:p});if(error)setMsg('login-msg',error.message,'error')});
        $('btn-signup').addEventListener('click',async()=>{setMsg('signup-msg','');const e=$('signup-email').value.trim(),p=$('signup-password').value,c=$('signup-password-confirm').value;if(!e||!p){setMsg('signup-msg','入力してください','error');return}if(p.length<6){setMsg('signup-msg','パスワードは6文字以上','error');return}if(p!==c){setMsg('signup-msg','パスワードが一致しません','error');return}setMsg('signup-msg','作成中...');const{error}=await supabase.auth.signUp({email:e,password:p});if(error){setMsg('signup-msg',error.message,'error');return}setMsg('signup-msg','作成完了！ログインしてください。','success')});
        $('btn-logout').addEventListener('click',async()=>{$('avatar-dropdown').classList.remove('open');await supabase.auth.signOut()});
        $('login-email').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-login').click()});
        $('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-login').click()});
        $('signup-password-confirm').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-signup').click()});

        supabase.auth.onAuthStateChange((e,s)=>{if(!$('login-screen'))return;if(s?.user)switchToApp(s.user);else switchToLogin()});
        const{data:{session}}=await supabase.auth.getSession();
        if($('login-screen')){if(session?.user)switchToApp(session.user);else switchToLogin()}
    </script>
